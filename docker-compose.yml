services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dwmb_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dwmb}
      POSTGRES_USER: ${POSTGRES_USER:-dwmb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/seeds:/docker-entrypoint-initdb.d/02-seeds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dwmb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dwmb_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dwmb}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dwmb}
      AI_SERVICE_URL: http://ai-service:8001
      SEARCH_SERVICE_URL: http://search-service:8002
      MEDIA_SERVICE_URL: http://media-service:8003
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: dwmb_ai_service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL_EMBEDDING: ${AI_MODEL_EMBEDDING:-text-embedding-3-small}
      AI_MODEL_CHAT: ${AI_MODEL_CHAT:-gpt-4o-mini}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  search-service:
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    container_name: dwmb_search_service
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dwmb}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dwmb}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    container_name: dwmb_media_service
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-dwmb_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-dwmb-media}
    depends_on:
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: dwmb_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-dwmb_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  pgdata:
  minio_data:
  media_data:
