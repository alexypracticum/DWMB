{% extends "base.html" %}
{% block title %}Новый пароль - DWMB{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md p-8 rounded-xl shadow-lg" style="background: var(--color-surface); border: 1px solid var(--color-border);">
        <h1 class="text-2xl font-bold mb-6" style="color: var(--color-text);">Новый пароль</h1>
        
        {% if error %}
        <div class="mb-4 p-3 rounded-lg text-sm" style="background: #fef2f2; color: #dc2626;">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="post" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <input type="hidden" name="token" value="{{ token }}">
            
            <div>
                <label class="block text-sm font-medium mb-1" style="color: var(--color-text);">Новый пароль</label>
                <input type="password" name="password" required minlength="8"
                    class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none"
                    style="background: var(--color-bg); border-color: var(--color-border); color: var(--color-text);"
                    placeholder="Минимум 8 символов">
            </div>
            
            <button type="submit" class="w-full py-2 px-4 rounded-lg font-medium transition" style="background: var(--color-primary); color: #fff;">
                Изменить пароль
            </button>
        </form>
    </div>
</div>
{% endblock %}
