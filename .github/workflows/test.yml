name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: dwmb_test
          POSTGRES_USER: dwmb
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://dwmb:test_password@localhost:5432/dwmb_test
      SECRET_KEY: ci-test-secret-key-for-github-actions-only-32ch
      ADMIN_PASSWORD: admin123
      OMDB_API_KEY: ""
      TMDB_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database
        run: |
          PGPASSWORD=test_password psql -h localhost -U dwmb -d dwmb_test -f db/init.sql || true

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests (Docker alternative)
        if: failure()
        run: |
          echo "Tests failed. Trying with Docker..."
          docker compose -f docker-compose.yml up -d db
          sleep 10
          docker compose -f docker-compose.yml exec -T db psql -U dwmb -d dwmb -f /docker-entrypoint-initdb.d/01-init.sql || true
