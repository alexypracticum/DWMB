name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://dwmb:test@localhost:5432/test
          SECRET_KEY: ci-test-secret-key-for-github-actions-only-32ch
          ADMIN_PASSWORD: admin123
          OMDB_API_KEY: ""
          TMDB_API_KEY: ""
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: dwmb_minio
          MINIO_SECRET_KEY: dwmb_minio_secret
          MINIO_BUCKET: dwmb-media
          REDIS_URL: redis://localhost:6379/0
          CORS_ORIGINS: http://localhost:8000
        run: |
          pytest tests/test_layout.py tests/test_external_apis.py tests/test_api_v1.py tests/test_security_features.py -v --tb=short

      - name: Test Docker build
        run: docker build -t dwmb-test .
