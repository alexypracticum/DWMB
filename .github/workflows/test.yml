name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql+asyncpg://dwmb:ci_password@db:5432/dwmb
          POSTGRES_DB=dwmb
          POSTGRES_USER=dwmb
          POSTGRES_PASSWORD=ci_password
          SECRET_KEY=ci-test-secret-key-for-github-actions-only-32chars!!
          ADMIN_PASSWORD=admin123
          OMDB_API_KEY=
          TMDB_API_KEY=
          MINIO_ENDPOINT=minio:9000
          MINIO_ACCESS_KEY=dwmb_minio
          MINIO_SECRET_KEY=dwmb_minio_secret
          MINIO_BUCKET=dwmb-media
          REDIS_URL=redis://redis:6379/0
          CORS_ORIGINS=http://localhost:8000
          EOF

      - name: Build and start services
        run: |
          docker compose up -d --build db redis minio
          echo "Waiting for services..."
          sleep 15
          docker compose ps

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U dwmb && break
            echo "Waiting for db... ($i)"
            sleep 2
          done

      - name: Run tests in app container
        run: |
          docker compose up -d --build app
          sleep 10
          docker compose exec -T app python -m pytest tests/ -v --tb=short 2>&1 | tee test-results.txt
          exit_code=${PIPESTATUS[0]}
          echo "Test exit code: $exit_code"
          exit $exit_code

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down -v
